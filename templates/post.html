<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="pygments.css">
    <link rel="stylesheet" href="post.css">
</head>

<body>

<nav class="topnav">
    <a href="/index.html">About</a>
    <a href="/posts.html">Posts</a>
</nav>

<header>
    <h1>{{title}}</h1>
    <p class="meta">{{date}}</p>
    <hr>
</header>

<main>
    {{content}}
</main>

<footer>
    <hr>
    <nav class="socials">
        <a href="https://github.com/parthivrmenon" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/parthivrmenon/" target="_blank" rel="noopener">LinkedIn</a>
    </nav>
</footer>

<script>
document.querySelectorAll("pre code").forEach(block => {
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    const container = block.closest(".codehilite") || block.parentElement;
    container.appendChild(btn);
    btn.addEventListener("click", () => {
        navigator.clipboard.writeText(block.innerText.trim()).then(() => {
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
        });
    });
});
</script>
</body>
</html>
