<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Geist:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Geist+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=Inconsolata:wght@400;700&display=swap">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="pygments.css">
    <link rel="stylesheet" href="post.css">
</head>

<body>

<header>
    <h1>{{title}}</h1>
    <p class="meta">{{date}}</p>
    <hr>
</header>

<main>
    {{content}}
</main>

<footer>
    <hr>
    <p>
        <a href="/index.html">Home</a>
    </p>
</footer>

<script>
document.querySelectorAll("pre code").forEach(block => {
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    const container = block.closest(".codehilite") || block.parentElement;
    container.appendChild(btn);
    btn.addEventListener("click", () => {
        navigator.clipboard.writeText(block.innerText.trim()).then(() => {
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
        });
    });
});
</script>
</body>
</html>
